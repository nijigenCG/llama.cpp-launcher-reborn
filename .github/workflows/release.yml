name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Prepare artifacts
        shell: pwsh
        run: |
          # 从 Cargo.toml 读取版本号
          $toml = Get-Content "Cargo.toml" -Raw
          if ($toml -match 'version\s*=\s*"([^"]+)"') {
            $version = $Matches[1]
          } else {
            Write-Error "无法从 Cargo.toml 读取版本号"
            exit 1
          }
          Write-Host "检测到版本号: $version"

          New-Item -ItemType Directory -Path "dist" -Force
          $exeName = "llama_cpp_launcher_v${version}.exe"
          Copy-Item "target/release/llama_cpp_launcher.exe" -Destination "dist/$exeName"
          Write-Host "已重命名为: $exeName"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-launcher-windows
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cargo for cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create AppImage
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          # 安装 AppImage 工具
          sudo apt-get update
          sudo apt-get install -y wget file fuse libfuse2
          
          # 下载 appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          
          # 从 Cargo.toml 读取版本号
          VERSION=$(awk -F '"' '/^\[package\]/ {p=1} p && /^version/ {print $2; exit}' Cargo.toml | tr -d '\n\r')
          echo "创建 AppImage: v${VERSION}"
          
          # 创建 AppDir 结构
          APPDIR="AppDir"
          mkdir -p ${APPDIR}/usr/bin
          mkdir -p ${APPDIR}/usr/share/applications
          mkdir -p ${APPDIR}/usr/share/icons/hicolor/256x256/apps
          
          # 复制图标到 AppDir 根目录（解决 appimagetool 的报错）
          cp llama-cpp-launcher.png ${APPDIR}/llama-cpp-launcher.png
  
          # 复制图标到 Linux 标准图标目录（让系统能正确显示图标）
          cp llama-cpp-launcher.png ${APPDIR}/usr/share/icons/hicolor/256x256/apps/llama-cpp-launcher.png
          
          # 复制二进制文件
          cp "target/${{ matrix.target }}/release/llama_cpp_launcher" "${APPDIR}/usr/bin/"
          
          # 创建 .desktop 文件
          cat > ${APPDIR}/llama-cpp-launcher.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Llama.cpp Launcher
          Exec=llama_cpp_launcher
          Icon=llama-cpp-launcher
          Categories=Development;
          Terminal=false
          Comment=A lightweight launcher for llama.cpp server
          EOF
          
          # 创建 AppRun 脚本
          cat > ${APPDIR}/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          "${HERE}/usr/bin/llama_cpp_launcher" "$@"
          EOF
          chmod +x ${APPDIR}/AppRun
          
          # 构建 AppImage
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run ${APPDIR} "llama_cpp_launcher_v${VERSION}_x86_64.AppImage"
          
          # 移动到 dist 目录
          mkdir -p dist
          mv "llama_cpp_launcher_v${VERSION}_x86_64.AppImage" dist/
          echo "已创建: llama_cpp_launcher_v${VERSION}_x86_64.AppImage"

      - name: Prepare artifacts
        run: |
          # 从 Cargo.toml 读取版本号
          VERSION=$(awk -F '"' '/^\[package\]/ {p=1} p && /^version/ {print $2; exit}' Cargo.toml | tr -d '\n\r')
          echo "检测到版本号: $VERSION"

          mkdir -p dist

          BINARY_NAME="llama_cpp_launcher_v${VERSION}_linux_${{ matrix.arch }}"

          # 复制并重命名
          cp "target/${{ matrix.target }}/release/llama_cpp_launcher" "dist/${BINARY_NAME}"

          # 创建 tar.gz
          cd dist
          tar czf "${BINARY_NAME}.tar.gz" "${BINARY_NAME}"
          rm "${BINARY_NAME}"

          echo "已创建: ${BINARY_NAME}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-launcher-linux-${{ matrix.arch }}
          path: dist/

      - name: Upload AppImage artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-launcher-linux-x86_64-appimage
          path: dist/*.AppImage

  release:
    needs: [ build-windows, build-linux ]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: llama-cpp-launcher-windows
          path: dist/

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llama-cpp-launcher-linux-x86_64
          path: dist/

      - name: Download Linux aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llama-cpp-launcher-linux-aarch64
          path: dist/

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: llama-cpp-launcher-linux-x86_64-appimage
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
